<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
<title>CDSP Reports | BEPO-PESO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f0f2f7;
    --surface: #ffffff;
    --surface2: #f7f9fc;
    --border: #e2e8f0;
    --text: #0d1b2e;
    --text2: #4a5a6e;
    --muted: #8a97a8;
    --accent: #0f766e;
    --accent-dark: #0d5f59;
    --accent-light: #e6f7f5;
    --orange: #f59e0b;
    --green: #16a34a;
    --blue: #3b6ef5;
    --pink: #ec4899;
    --red: #dc2626;
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(13,27,46,0.06), 0 8px 24px rgba(13,27,46,0.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }
  .main { padding: 28px 32px 40px; max-width: 1400px; margin: 0 auto; animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .page-header { margin-bottom: 24px; }
  .page-header h2 { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.4px; display: flex; align-items: center; gap: 8px; }

  /* Stats Grid */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; box-shadow: var(--shadow); text-align: center; transition: transform 0.1s ease; }
  .stat-card .stat-value { font-size: 36px; font-weight: 700; color: var(--accent); font-family: var(--mono); line-height: 1.2; }
  .stat-card .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }

  /* Two column layout for charts */
  .reports-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
  .report-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
  .report-card h3 { font-size: 16px; font-weight: 600; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .report-card .card-body { padding: 20px; }
  canvas { max-height: 280px; width: 100%; }

  /* Table styles */
  .table-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 32px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--surface2); border-bottom: 2px solid var(--border); }
  th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
  td { padding: 10px 16px; border-bottom: 1px solid var(--border); color: var(--text); }
  tbody tr:hover { background: var(--accent-light); }
  .district-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; color: #fff; }
  .district-1 { background: var(--blue); }
  .district-2 { background: var(--pink); }
  .district-3 { background: var(--green); }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .reports-grid { grid-template-columns: 1fr; gap: 20px; }
    .main { padding: 20px 16px; }
  }
</style>
</head>
<body>

<main class="main">
  <div class="page-header">
    <h2>📊 CDSP Reports & Analytics</h2>
  </div>

  <!-- Stats cards -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-value" id="totalEvents">0</div><div class="stat-label">Total Events</div></div>
    <div class="stat-card"><div class="stat-value" id="totalStudents">0</div><div class="stat-label">Total Students</div></div>
    <div class="stat-card"><div class="stat-value" id="completeEvents">0</div><div class="stat-label">Complete</div></div>
    <div class="stat-card"><div class="stat-value" id="incompleteEvents">0</div><div class="stat-label">Incomplete</div></div>
  </div>

  <!-- Charts row -->
  <div class="reports-grid">
    <div class="report-card">
      <h3>📌 Events per District</h3>
      <div class="card-body"><canvas id="districtEventsChart" width="400" height="250"></canvas></div>
    </div>
    <div class="report-card">
      <h3>🎓 Students per District</h3>
      <div class="card-body"><canvas id="districtStudentsChart" width="400" height="250"></canvas></div>
    </div>
    <div class="report-card">
      <h3>✅ Status Distribution</h3>
      <div class="card-body"><canvas id="statusChart" width="400" height="250"></canvas></div>
    </div>
    <div class="report-card">
      <h3>📅 Events by Month (Last 12 months)</h3>
      <div class="card-body"><canvas id="monthlyChart" width="400" height="250"></canvas></div>
    </div>
  </div>

  <!-- Top Municipalities Table -->
  <div class="table-card">
    <h3 style="padding: 16px 20px; margin:0; border-bottom:1px solid var(--border);">🏆 Top 10 Municipalities by Number of Events</h3>
    <div class="table-wrap">
      <table id="topMunicipalitiesTable">
        <thead><tr><th>Municipality</th><th>District</th><th>Events</th><th>Total Students</th></tr></thead>
        <tbody><tr><td colspan="4" style="text-align:center;">Loading data…</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<script src="navbar.js"></script>
<script>
  (function() {
    // Supabase config
    const SUPABASE_URL = 'https://iharcxdakmyxjpqpcbnb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloYXJjeGRha215eGpwcXBjYm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODc0NDEsImV4cCI6MjA5NDA2MzQ0MX0.5BE8ckW-3g5mJmXyrDWO_cytfI-_JrMaV4LQip7pbvs';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let events = [];

    // Chart instances
    let districtEventsChart, districtStudentsChart, statusChart, monthlyChart;

    // Helper: format month label
    function getMonthLabel(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleString('default', { month: 'short', year: 'numeric' });
    }

    // Process data and update all UI
    async function loadReports() {
      try {
        const { data, error } = await sb.from('cdsp_events').select('*');
        if (error) throw error;
        events = data || [];

        // Update stats cards
        const totalEvents = events.length;
        const totalStudents = events.reduce((sum, e) => sum + (e.total_students || 0), 0);
        const complete = events.filter(e => e.status === 'Complete').length;
        const incomplete = events.filter(e => e.status === 'Incomplete').length;
        document.getElementById('totalEvents').innerText = totalEvents;
        document.getElementById('totalStudents').innerText = totalStudents;
        document.getElementById('completeEvents').innerText = complete;
        document.getElementById('incompleteEvents').innerText = incomplete;

        // District aggregations
        const districtStats = { 1: { events: 0, students: 0 }, 2: { events: 0, students: 0 }, 3: { events: 0, students: 0 } };
        events.forEach(e => {
          const d = e.district;
          if (districtStats[d]) {
            districtStats[d].events++;
            districtStats[d].students += (e.total_students || 0);
          }
        });

        const districtLabels = ['District 1', 'District 2', 'District 3'];
        const eventCounts = [districtStats[1].events, districtStats[2].events, districtStats[3].events];
        const studentCounts = [districtStats[1].students, districtStats[2].students, districtStats[3].students];

        // District Events Chart (Bar)
        if (districtEventsChart) districtEventsChart.destroy();
        districtEventsChart = new Chart(document.getElementById('districtEventsChart'), {
          type: 'bar',
          data: { labels: districtLabels, datasets: [{ label: 'Number of Events', data: eventCounts, backgroundColor: ['#3b6ef5', '#ec4899', '#16a34a'], borderRadius: 6 }] },
          options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } } }
        });

        // District Students Chart (Bar)
        if (districtStudentsChart) districtStudentsChart.destroy();
        districtStudentsChart = new Chart(document.getElementById('districtStudentsChart'), {
          type: 'bar',
          data: { labels: districtLabels, datasets: [{ label: 'Total Students', data: studentCounts, backgroundColor: ['#3b6ef5', '#ec4899', '#16a34a'], borderRadius: 6 }] },
          options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } } }
        });

        // Status Chart (Pie)
        if (statusChart) statusChart.destroy();
        statusChart = new Chart(document.getElementById('statusChart'), {
          type: 'pie',
          data: { labels: ['Complete', 'Incomplete'], datasets: [{ data: [complete, incomplete], backgroundColor: ['#16a34a', '#f59e0b'], borderWidth: 0 }] },
          options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
        });

        // Monthly trends (last 12 months from today)
        const monthlyMap = new Map();
        const now = new Date();
        const last12Months = [];
        for (let i = 11; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const key = `${d.getFullYear()}-${d.getMonth()+1}`;
          const label = d.toLocaleString('default', { month: 'short', year: 'numeric' });
          last12Months.push({ key, label });
          monthlyMap.set(key, 0);
        }
        events.forEach(e => {
          if (e.created_at) {
            const date = new Date(e.created_at);
            const key = `${date.getFullYear()}-${date.getMonth()+1}`;
            if (monthlyMap.has(key)) monthlyMap.set(key, monthlyMap.get(key) + 1);
          }
        });
        const monthlyLabels = last12Months.map(m => m.label);
        const monthlyData = last12Months.map(m => monthlyMap.get(m.key));
        if (monthlyChart) monthlyChart.destroy();
        monthlyChart = new Chart(document.getElementById('monthlyChart'), {
          type: 'line',
          data: { labels: monthlyLabels, datasets: [{ label: 'Events Created', data: monthlyData, borderColor: '#0f766e', backgroundColor: 'rgba(15,118,110,0.1)', fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#0f766e' }] },
          options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } } }
        });

        // Top 10 municipalities
        const municipalityMap = new Map(); // key: municipality name -> { events, students, district }
        events.forEach(e => {
          if (!e.municipality) return;
          const mun = e.municipality;
          if (!municipalityMap.has(mun)) {
            municipalityMap.set(mun, { events: 0, students: 0, district: e.district });
          }
          const rec = municipalityMap.get(mun);
          rec.events++;
          rec.students += (e.total_students || 0);
        });
        const topMunicipalities = Array.from(municipalityMap.entries())
          .map(([name, data]) => ({ name, events: data.events, students: data.students, district: data.district }))
          .sort((a,b) => b.events - a.events)
          .slice(0, 10);
        
        const tableBody = document.querySelector('#topMunicipalitiesTable tbody');
        if (topMunicipalities.length === 0) {
          tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No data</td></tr>';
        } else {
          tableBody.innerHTML = topMunicipalities.map(m => `
            <tr>
              <td><strong>${escapeHtml(m.name)}</strong></td>
              <td><span class="district-badge district-${m.district}">District ${m.district}</span></td>
              <td>${m.events}</td>
              <td>${m.students}</td>
            </tr>
          `).join('');
        }
      } catch (err) {
        console.error(err);
        document.querySelector('#topMunicipalitiesTable tbody').innerHTML = '<tr><td colspan="4" style="text-align:center;">Failed to load data</td></tr>';
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Initialize navbar then load data
    if (window.renderCDSPNavbar) window.renderCDSPNavbar();
    loadReports();
  })();
</script>
</body>
</html>
