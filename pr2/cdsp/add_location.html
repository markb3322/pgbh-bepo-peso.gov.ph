<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
<title>Location Management | BEPO-PESO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #f0f2f7;
  --surface: #ffffff;
  --surface2: #f7f9fc;
  --border: #e2e8f0;
  --text: #0d1b2e;
  --text2: #4a5a6e;
  --muted: #8a97a8;
  --accent: #0f766e;
  --accent-dark: #0d5f59;
  --accent-light: #e6f7f5;
  --red: #dc2626;
  --red-bg: #fdecea;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(13,27,46,0.06), 0 8px 24px rgba(13,27,46,0.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
.main { padding: 28px 32px 40px; max-width: 1200px; margin: 0 auto; animation: fadeUp 0.4s ease both; width: 100%; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-header h2 { font-size: 22px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
.page-subtitle { font-size: 13px; color: var(--muted); margin-top: -16px; margin-bottom: 20px; }

.btn { display: inline-flex; align-items: center; gap: 7px; border: none; border-radius: 10px; padding: 9px 18px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all 0.14s ease; font-family: var(--font); text-decoration: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
.btn-secondary { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface2); }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid transparent; }
.btn-danger:hover { background: #fce4e4; }

.filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
.filter-bar label { font-size: 12px; font-weight: 600; color: var(--text2); white-space: nowrap; }
.filter-bar select, .filter-bar input { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: var(--font); outline: none; background: var(--surface); min-width: 150px; }
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--accent); }
.filter-bar .badge-count { font-size: 12px; color: var(--accent); background: var(--accent-light); padding: 5px 12px; border-radius: 20px; font-weight: 600; margin-left: auto; }

.form-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow); }
.form-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text2); }
.form-group input, .form-group select { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: var(--font); outline: none; background: var(--surface); }
.form-group input:focus, .form-group select:focus { border-color: var(--accent); }
.form-group .required::after { content: ' *'; color: var(--red); }
.form-actions { margin-top: 20px; display: flex; gap: 12px; justify-content: flex-end; }

.table-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
thead { background: var(--surface2); border-bottom: 2px solid var(--border); position: sticky; top: 0; }
th { padding: 12px 14px; text-align: left; font-size: 10.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
tbody tr:hover { background: var(--accent-light); }
.td-actions { display: flex; gap: 6px; }
.empty-state { text-align: center; padding: 40px; color: var(--muted); }

.district-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; color: #fff; }
.district-1 { background: #3b6ef5; }
.district-2 { background: #ec4899; }
.district-3 { background: #16a34a; }

.toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.toast { background: #0d1b2e; color: #fff; padding: 12px 18px; border-radius: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.2); animation: slideIn 0.25s ease; display: flex; align-items: center; gap: 8px; pointer-events: all; }
.toast.success .toast-icon { color: #4ade80; }
.toast.error .toast-icon { color: #f87171; }
@keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

@media (max-width: 768px) {
  .main { padding: 16px 14px 32px; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<main class="main">
  <div class="page-header">
    <h2>📍 Location Management</h2>
    <button class="btn btn-primary" id="toggleFormBtn">+ Add New Location</button>
  </div>
  <p class="page-subtitle">Manage Municipalities, Barangays, and Zip Codes by District</p>

  <!-- Form -->
  <div class="form-card" id="locationForm" style="display: none;">
    <div class="form-title">📝 <span id="formTitle">Add New Location</span></div>
    <input type="hidden" id="locationId" />
    <div class="form-grid">
      <div class="form-group">
        <label class="required">District</label>
        <select id="district">
          <option value="">Select District</option>
          <option value="1">District 1</option>
          <option value="2">District 2</option>
          <option value="3">District 3</option>
        </select>
      </div>
      <div class="form-group">
        <label class="required">Municipality</label>
        <input type="text" id="municipality" placeholder="Enter municipality name" />
      </div>
      <div class="form-group">
        <label class="required">Barangay</label>
        <input type="text" id="barangay" placeholder="Enter barangay name" />
      </div>
      <div class="form-group">
        <label class="required">Zip Code</label>
        <input type="text" id="zipcode" placeholder="e.g. 6300" maxlength="4" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" id="cancelFormBtn">Cancel</button>
      <button class="btn btn-primary" id="saveLocationBtn">💾 Save Location</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <label>District:</label>
    <select id="filterDistrict">
      <option value="">All Districts</option>
      <option value="1">District 1</option>
      <option value="2">District 2</option>
      <option value="3">District 3</option>
    </select>
    <label>Municipality:</label>
    <select id="filterMunicipality">
      <option value="">All Municipalities</option>
    </select>
    <label>Search:</label>
    <input type="text" id="filterSearch" placeholder="Search barangay, zip code..." />
    <span class="badge-count" id="countBadge">0 locations</span>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>District</th>
            <th>Municipality</th>
            <th>Barangay</th>
            <th>Zip Code</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" class="empty-state">Loading locations...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script src="navbar.js"></script>
<script>
(function() {
  'use strict';

  const SUPABASE_URL = 'https://iharcxdakmyxjpqpcbnb.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloYXJjeGRha215eGpwcXBjYm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODc0NDEsImV4cCI6MjA5NDA2MzQ0MX0.5BE8ckW-3g5mJmXyrDWO_cytfI-_JrMaV4LQip7pbvs';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let allLocations = [];
  let currentEditId = null;

  function showToast(message, type) {
    var container = document.getElementById('toastContainer');
    var toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'success');
    toast.innerHTML = '<span class="toast-icon">' + (type === 'error' ? '✕' : '✓') + '</span><span>' + message + '</span>';
    container.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 3000);
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  async function loadLocations() {
    try {
      var result = await sb
        .from('locations')
        .select('*')
        .order('district', { ascending: true })
        .order('municipality', { ascending: true })
        .order('barangay', { ascending: true });

      if (result.error) {
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="empty-state">Error: ' + esc(result.error.message) + '</td></tr>';
        return;
      }
      allLocations = result.data || [];
      populateMunicipalityFilter(); // Initial load: show all municipalities
      applyFilters();
    } catch (err) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="empty-state">Failed to load locations</td></tr>';
    }
  }

  // FIXED: Now filters municipalities by selected district
  function populateMunicipalityFilter() {
    var districtFilter = document.getElementById('filterDistrict').value;
    var select = document.getElementById('filterMunicipality');
    var municipalities = [];
    
    allLocations.forEach(function(loc) {
      // If a district is selected, only show municipalities from that district
      if (!districtFilter || loc.district == districtFilter) {
        if (municipalities.indexOf(loc.municipality) === -1) {
          municipalities.push(loc.municipality);
        }
      }
    });
    
    municipalities.sort();
    
    var currentValue = select.value; // Preserve selected value if still valid
    select.innerHTML = '<option value="">All Municipalities</option>';
    municipalities.forEach(function(mun) {
      var selected = (mun === currentValue) ? ' selected' : '';
      select.innerHTML += '<option value="' + esc(mun) + '"' + selected + '>' + esc(mun) + '</option>';
    });
  }

  function applyFilters() {
    var districtFilter = document.getElementById('filterDistrict').value;
    var municipalityFilter = document.getElementById('filterMunicipality').value;
    var searchFilter = document.getElementById('filterSearch').value.toLowerCase();
    
    var filtered = allLocations.slice();
    
    if (districtFilter) {
      filtered = filtered.filter(function(l) { return l.district == districtFilter; });
    }
    if (municipalityFilter) {
      filtered = filtered.filter(function(l) { return l.municipality === municipalityFilter; });
    }
    if (searchFilter) {
      filtered = filtered.filter(function(l) {
        return (l.barangay || '').toLowerCase().indexOf(searchFilter) !== -1 ||
               (l.zipcode || '').toLowerCase().indexOf(searchFilter) !== -1;
      });
    }
    
    renderTable(filtered);
    document.getElementById('countBadge').textContent = filtered.length + ' location' + (filtered.length !== 1 ? 's' : '');
  }

  function renderTable(locations) {
    var tbody = document.getElementById('tableBody');
    
    if (!locations || locations.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">📭 No locations found</td></tr>';
      return;
    }
    
    tbody.innerHTML = locations.map(function(loc, i) {
      return '<tr>' +
        '<td>' + (i + 1) + '</td>' +
        '<td><span class="district-badge district-' + loc.district + '">District ' + loc.district + '</span></td>' +
        '<td><strong>' + esc(loc.municipality) + '</strong></td>' +
        '<td>' + esc(loc.barangay) + '</td>' +
        '<td><span style="font-family:var(--mono);color:var(--accent);">' + esc(loc.zipcode) + '</span></td>' +
        '<td class="td-actions">' +
          '<button class="btn btn-secondary btn-sm" data-action="edit" data-id="' + loc.id + '">✏️ Edit</button>' +
          '<button class="btn btn-danger btn-sm" data-action="delete" data-id="' + loc.id + '">🗑️ Delete</button>' +
        '</td></tr>';
    }).join('');

    tbody.querySelectorAll('[data-action="edit"]').forEach(function(btn) {
      btn.addEventListener('click', function() { editLocation(this.dataset.id); });
    });
    tbody.querySelectorAll('[data-action="delete"]').forEach(function(btn) {
      btn.addEventListener('click', function() { deleteLocation(this.dataset.id); });
    });
  }

  function editLocation(id) {
    var loc = allLocations.find(function(l) { return l.id === id; });
    if (!loc) return;
    currentEditId = id;
    document.getElementById('locationId').value = loc.id;
    document.getElementById('district').value = loc.district;
    document.getElementById('municipality').value = loc.municipality;
    document.getElementById('barangay').value = loc.barangay;
    document.getElementById('zipcode').value = loc.zipcode;
    document.getElementById('formTitle').textContent = 'Edit Location';
    document.getElementById('locationForm').style.display = 'block';
    document.getElementById('toggleFormBtn').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function deleteLocation(id) {
    if (!confirm('Delete this location?')) return;
    try {
      var result = await sb.from('locations').delete().eq('id', id);
      if (result.error) { showToast('Delete failed: ' + result.error.message, 'error'); return; }
      allLocations = allLocations.filter(function(l) { return l.id !== id; });
      populateMunicipalityFilter();
      applyFilters();
      showToast('Location deleted ✓');
    } catch (err) { showToast('Error: ' + err.message, 'error'); }
  }

  async function saveLocation() {
    var district = document.getElementById('district').value;
    var municipality = document.getElementById('municipality').value.trim();
    var barangay = document.getElementById('barangay').value.trim();
    var zipcode = document.getElementById('zipcode').value.trim();
    
    if (!district) { showToast('Please select district', 'error'); return; }
    if (!municipality) { showToast('Please enter municipality', 'error'); return; }
    if (!barangay) { showToast('Please enter barangay', 'error'); return; }
    if (!zipcode) { showToast('Please enter zip code', 'error'); return; }
    
    var payload = { district: district, municipality: municipality, barangay: barangay, zipcode: zipcode };
    
    try {
      var result;
      if (currentEditId) {
        result = await sb.from('locations').update(payload).eq('id', currentEditId).select();
        if (result.error) { showToast('Update failed: ' + result.error.message, 'error'); return; }
        var idx = allLocations.findIndex(function(l) { return l.id === currentEditId; });
        if (idx !== -1 && result.data && result.data[0]) allLocations[idx] = result.data[0];
        showToast('Location updated ✓');
      } else {
        result = await sb.from('locations').insert([payload]).select();
        if (result.error) { showToast('Insert failed: ' + result.error.message, 'error'); return; }
        if (result.data && result.data[0]) allLocations.push(result.data[0]);
        showToast('Location added ✓');
      }
      resetForm();
      populateMunicipalityFilter();
      applyFilters();
    } catch (err) { showToast('Error: ' + err.message, 'error'); }
  }

  function resetForm() {
    currentEditId = null;
    document.getElementById('locationId').value = '';
    document.getElementById('district').value = '';
    document.getElementById('municipality').value = '';
    document.getElementById('barangay').value = '';
    document.getElementById('zipcode').value = '';
    document.getElementById('formTitle').textContent = 'Add New Location';
    document.getElementById('locationForm').style.display = 'none';
    document.getElementById('toggleFormBtn').style.display = 'inline-flex';
  }

  function init() {
    if (typeof window.renderCDSPNavbar === 'function') {
      window.renderCDSPNavbar();
    }

    document.getElementById('toggleFormBtn').addEventListener('click', function() {
      resetForm();
      document.getElementById('locationForm').style.display = 'block';
      document.getElementById('toggleFormBtn').style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    document.getElementById('cancelFormBtn').addEventListener('click', resetForm);
    document.getElementById('saveLocationBtn').addEventListener('click', saveLocation);

    // FIXED: District filter triggers municipality dropdown update
    document.getElementById('filterDistrict').addEventListener('change', function() {
      populateMunicipalityFilter(); // Repopulate municipalities based on selected district
      applyFilters();
    });
    
    document.getElementById('filterMunicipality').addEventListener('change', applyFilters);
    document.getElementById('filterSearch').addEventListener('input', applyFilters);
    
    loadLocations();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
