<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Logging Out | BEPO-PESO</title>

    <!-- ==================== DEPENDENCIES ==================== -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- ==================== TAILWIND CONFIG ==================== -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Playfair Display', 'Georgia', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <!-- ==================== CUSTOM STYLES ==================== -->
    <style>
        .fade-in { animation: fadeIn 0.6s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .slide-up { animation: slideUp 0.5s ease both; animation-delay: 0.3s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex items-center justify-center p-4">

    <!-- ==================== MAIN CONTAINER ==================== -->
    <div class="w-full max-w-md fade-in">
        
        <!-- ==================== CARD ==================== -->
        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-8 text-center">
            
            <!-- ==================== ICON ==================== -->
            <div class="mb-6">
                <div class="w-20 h-20 mx-auto bg-red-50 rounded-full flex items-center justify-center">
                    <i class="fas fa-right-from-bracket text-red-500 text-3xl pulse"></i>
                </div>
            </div>

            <!-- ==================== TITLE ==================== -->
            <h1 class="text-2xl font-display font-bold text-slate-800 mb-2">
                Logging Out
            </h1>
            <p class="text-slate-500 text-sm mb-2">
                Please wait while we securely log you out...
            </p>
            <p class="text-slate-400 text-xs mb-8">
                You will be redirected to the login page shortly.
            </p>

            <!-- ==================== PROGRESS BAR ==================== -->
            <div class="w-full bg-slate-100 rounded-full h-2 mb-6 overflow-hidden">
                <div id="progressBar" class="bg-teal-500 h-full rounded-full transition-all duration-300" style="width: 0%;"></div>
            </div>

            <!-- ==================== STATUS TEXT ==================== -->
            <p id="statusText" class="text-xs text-slate-400 font-mono mb-6">
                Clearing session data...
            </p>

            <!-- ==================== MANUAL REDIRECT BUTTON ==================== -->
            <div class="slide-up">
                <p class="text-xs text-slate-400 mb-3">Not redirected? Click below:</p>
                <a href="../login.html" class="inline-flex items-center gap-2 px-6 py-2.5 bg-teal-600 text-white rounded-xl font-semibold text-sm hover:bg-teal-700 transition-all shadow-sm">
                    <i class="fas fa-sign-in-alt"></i> Go to Login
                </a>
            </div>
        </div>

        <!-- ==================== FOOTER ==================== -->
        <p class="text-center text-xs text-slate-400 mt-6 font-mono">
            &copy; 2026 BEPO-PESO · Career Development Support Program
        </p>
    </div>

    <!-- ==================== SCRIPT ==================== -->
    <script>
    (function() {
        'use strict';

        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');

        const statusMessages = [
            'Clearing session data...',
            'Removing credentials...',
            'Securing your information...',
            'Redirecting to login...'
        ];

        let progress = 0;
        let messageIndex = 0;

        // Update progress bar and status text
        const interval = setInterval(() => {
            progress += 25;
            progressBar.style.width = progress + '%';

            if (messageIndex < statusMessages.length) {
                statusText.textContent = statusMessages[messageIndex];
                messageIndex++;
            }

            if (progress >= 100) {
                clearInterval(interval);
                performLogout();
            }
        }, 600);

        function performLogout() {
            // Clear all session and local storage
            sessionStorage.clear();
            localStorage.removeItem('bepo_user_name');
            localStorage.removeItem('bepo_user_fullname');
            localStorage.removeItem('bepo_user_id');
            localStorage.removeItem('bepo_id_number');
            localStorage.removeItem('bepo_user_role');
            localStorage.removeItem('supabase.auth.token');
            localStorage.removeItem('rememberedUserId');

            statusText.textContent = '✓ Logout successful!';

            // Redirect to login page after short delay
            setTimeout(() => {
                window.location.href = '../login.html';
            }, 800);
        }
    })();
    </script>

</body>
</html>
