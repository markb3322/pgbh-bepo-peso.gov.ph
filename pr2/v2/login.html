<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>BEPO-PESO PORTAL | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Playfair Display', 'Georgia', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #0f766e 0%, #14b8a6 50%, #0d9488 100%);
            min-height: 100vh;
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .toggle-password {
            cursor: pointer;
            transition: color 0.2s;
        }
        .toggle-password:hover {
            color: #0f766e;
        }
    </style>
</head>
<body class="font-sans antialiased flex items-center justify-center p-4">

    <!-- ==================== LOGIN CARD ==================== -->
    <div class="login-card w-full max-w-md rounded-3xl shadow-2xl p-8 border border-teal-100">
        
        <!-- Logo and Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-teal-50 border border-teal-200 mb-4">
                <img src="image/bepo.png" alt="BEPO Logo" class="w-14 h-14 object-contain" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
                <div class="w-14 h-14 bg-teal-600 rounded-xl flex items-center justify-center text-white font-bold text-xl" style="display:none;">BP</div>
            </div>
            <h1 class="text-2xl font-display font-bold text-teal-800">BEPO-PESO PORTAL</h1>
            <p class="text-teal-600 text-sm mt-1">Bohol Employment Placement Office</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-5">
            <!-- User ID -->
            <div>
                <label for="userid" class="block text-xs font-semibold text-teal-700 uppercase tracking-wide mb-1">
                    <i class="fas fa-user mr-1"></i> User ID
                </label>
                <input type="text" id="userid" name="userid" required
                       class="w-full px-4 py-3 border border-teal-200 rounded-xl text-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition"
                       placeholder="Enter your User ID" />
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-xs font-semibold text-teal-700 uppercase tracking-wide mb-1">
                    <i class="fas fa-lock mr-1"></i> Password
                </label>
                <div class="relative">
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 border border-teal-200 rounded-xl text-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition pr-12"
                           placeholder="Enter your password" />
                    <span class="absolute right-3 top-1/2 -translate-y-1/2 toggle-password text-teal-400" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-teal-300 text-teal-600 focus:ring-teal-500" />
                    <span class="text-teal-700">Remember me</span>
                </label>
                <a href="#" id="forgotPasswordLink" class="text-teal-600 hover:text-teal-800 font-medium transition">
                    Forgot Password?
                </a>
            </div>

            <!-- Login Button -->
            <button type="submit"
                    class="w-full py-3 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-xl transition shadow-lg flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center text-xs text-teal-500 font-mono">
            <p class="font-semibold">BEPO-PESO Login PORTAL</p>
            <p>&copy; BEPO-PESO all rights reserved 2026</p>
        </div>
    </div>

    <!-- ==================== FORGOT PASSWORD MODAL ==================== -->
    <div id="forgotPasswordModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl p-6 relative">
            <button id="closeForgotPasswordModal" class="absolute top-3 right-3 text-teal-400 hover:text-teal-600 transition">
                <i class="fas fa-times text-xl"></i>
            </button>
            <h3 class="text-xl font-display font-bold text-teal-800 mb-2"><i class="fas fa-key mr-2"></i>Forgot Password</h3>
            <p class="text-sm text-teal-600 mb-4">Enter your registered email address to retrieve your password.</p>
            
            <div class="space-y-3">
                <div>
                    <label for="resetEmail" class="block text-xs font-semibold text-teal-700 uppercase tracking-wide mb-1">Email Address</label>
                    <input type="email" id="resetEmail" required
                           class="w-full px-4 py-3 border border-teal-200 rounded-xl text-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition"
                           placeholder="your@email.com" />
                </div>
                <button id="retrievePasswordBtn"
                        class="w-full py-3 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-xl transition flex items-center justify-center gap-2">
                    <i class="fas fa-search"></i> Retrieve Password
                </button>
                <div id="passwordResult" class="hidden mt-3 p-3 bg-teal-50 border border-teal-200 rounded-xl">
                    <p class="text-xs text-teal-700 font-semibold mb-1">Your Password:</p>
                    <div class="flex items-center gap-2">
                        <code id="retrievedPassword" class="flex-1 bg-white px-3 py-2 rounded-lg text-sm font-mono text-teal-800 break-all"></code>
                        <button id="copyPasswordBtn" class="px-3 py-2 bg-teal-100 hover:bg-teal-200 text-teal-700 rounded-lg text-xs font-semibold transition">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════
        // SUPABASE CONFIGURATION
        // ═══════════════════════════════════════
        const SUPABASE_URL = 'https://lfmcgktlmdiwddngytkq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmbWNna3RsbWRpd2Rkbmd5dGtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDQ0NTIsImV4cCI6MjA5NTQ4MDQ1Mn0.yRluC6tQAKSfSXsKdDtils5ztk-CLZzjatjOHx1ot2s';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ═══════════════════════════════════════
        // DOM ELEMENTS
        // ═══════════════════════════════════════
        const loginForm = document.getElementById('loginForm');
        const useridInput = document.getElementById('userid');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        const forgotPasswordModal = document.getElementById('forgotPasswordModal');
        const closeForgotPasswordModal = document.getElementById('closeForgotPasswordModal');
        const resetEmailInput = document.getElementById('resetEmail');
        const retrievePasswordBtn = document.getElementById('retrievePasswordBtn');
        const passwordResult = document.getElementById('passwordResult');
        const retrievedPasswordSpan = document.getElementById('retrievedPassword');
        const copyPasswordBtn = document.getElementById('copyPasswordBtn');

        // ═══════════════════════════════════════
        // TOGGLE PASSWORD VISIBILITY
        // ═══════════════════════════════════════
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // ═══════════════════════════════════════
        // REMEMBER ME – load saved user ID
        // ═══════════════════════════════════════
        const savedUserId = localStorage.getItem('rememberedUserId');
        if (savedUserId) {
            useridInput.value = savedUserId;
            rememberMeCheckbox.checked = true;
        }

        // ═══════════════════════════════════════
        // LOGIN FORM SUBMISSION
        // ═══════════════════════════════════════
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userId = useridInput.value.trim();
            const password = passwordInput.value.trim();

            if (!userId || !password) {
                alert('Please enter both User ID and Password.');
                return;
            }

            // Remember me
            if (rememberMeCheckbox.checked) {
                localStorage.setItem('rememberedUserId', userId);
            } else {
                localStorage.removeItem('rememberedUserId');
            }

            try {
                const { data, error } = await sb
                    .from('members')
                    .select('*')
                    .eq('user_id', userId)
                    .eq('password', password)
                    .maybeSingle();

                if (error) throw error;

                if (!data) {
                    alert('Invalid User ID or Password. Please try again.');
                    return;
                }

                // Successful login
                const fullname = (data.first_name || '') + ' ' + (data.last_name || '');
                const nickname = data.nickname || data.first_name || 'User';
                
                // Store user info for the navbar
                sessionStorage.setItem('bepo_user_id', data.id);
                sessionStorage.setItem('bepo_user_name', nickname);
                sessionStorage.setItem('bepo_user_fullname', fullname.trim() || nickname);
                sessionStorage.setItem('bepo_id_number', data.employee_no || data.user_id);
                sessionStorage.setItem('bepo_user_role', data.role);

                // Redirect based on role
                if (data.role === 'cdspv2') {
                    window.location.href = 'cdspv2/index.html';
                } else if (data.role === 'employee') {
                    window.location.href = 'employee/index.html';
                } else {
                    // fallback
                    window.location.href = 'cdspv2/index.html';
                }

            } catch (err) {
                console.error('Login error:', err);
                alert('An error occurred during login. Please try again.');
            }
        });

        // ═══════════════════════════════════════
        // FORGOT PASSWORD MODAL
        // ═══════════════════════════════════════
        forgotPasswordLink.addEventListener('click', function(e) {
            e.preventDefault();
            forgotPasswordModal.classList.remove('hidden');
            forgotPasswordModal.classList.add('flex');
            resetEmailInput.value = '';
            passwordResult.classList.add('hidden');
        });

        closeForgotPasswordModal.addEventListener('click', function() {
            forgotPasswordModal.classList.add('hidden');
            forgotPasswordModal.classList.remove('flex');
        });

        forgotPasswordModal.addEventListener('click', function(e) {
            if (e.target === this) {
                forgotPasswordModal.classList.add('hidden');
                forgotPasswordModal.classList.remove('flex');
            }
        });

        retrievePasswordBtn.addEventListener('click', async function() {
            const email = resetEmailInput.value.trim();
            if (!email) {
                alert('Please enter your email address.');
                return;
            }

            retrievePasswordBtn.disabled = true;
            retrievePasswordBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';

            try {
                const { data, error } = await sb
                    .from('members')
                    .select('password')
                    .eq('email', email)
                    .maybeSingle();

                if (error) throw error;

                if (!data) {
                    alert('No account found with that email address.');
                    retrievePasswordBtn.disabled = false;
                    retrievePasswordBtn.innerHTML = '<i class="fas fa-search"></i> Retrieve Password';
                    return;
                }

                retrievedPasswordSpan.textContent = data.password;
                passwordResult.classList.remove('hidden');

            } catch (err) {
                console.error('Password retrieval error:', err);
                alert('An error occurred. Please try again.');
            } finally {
                retrievePasswordBtn.disabled = false;
                retrievePasswordBtn.innerHTML = '<i class="fas fa-search"></i> Retrieve Password';
            }
        });

        copyPasswordBtn.addEventListener('click', function() {
            const password = retrievedPasswordSpan.textContent;
            if (!password) return;
            navigator.clipboard.writeText(password).then(() => {
                copyPasswordBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    copyPasswordBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                }, 2000);
            }).catch(() => {
                alert('Failed to copy. Please copy manually.');
            });
        });
    </script>
</body>
</html>
